<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>

    <h2>
        Em HTML, podemos  inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.
    </h2>
    <p>
        <ul type="square">
            <li> <abbr title="use a tag <P>">Parágrafos</abbr></li>
            <li> <abbr title="tag <Title>">Títulos</abbr></li>
            <li> <abbr title="use a Tag <img> src">Imagens</abbr></li>
            <li> <abbr title="use a tag <abbr>">Abreviações</abbr></li>
            <li> <abbr title="Usando a tag <font> (antiga, não recomendada)">Códigos-fonte</abbr></li>
            <li> <abbr title="usar a tag <ol> (ordered list)">Listas númeradas</abbr></li>
            <li> <abbr title="usando a tag <ul> (unordered list)">Listas com Demarcadores</abbr></li>
        </ul>
    </p>
</body>
</html>
