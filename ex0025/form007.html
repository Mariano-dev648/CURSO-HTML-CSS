<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1> Exemplo de formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on"> <!--TODO FORMULARIO QUE TENHA MAIS DE 3000BITS DEVE UTILIZAR O METODO POST-->

        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest">

                    <option value="" selected>---Escolha---</option>
                <optgroup label="Região sudeste">
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                </optgroup>


                <optgroup label="Região Nordeste">
                    <option value="MA">Maranhão</option>
                    <option value="PE">Pernambuco</option>
                    <option value="RN">Rio Grande do Norte</option>
                </optgroup>

            </select>
        </p>
        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="prof" id="iprof" list="ilstprof">
            <datalist id="ilstprof">
                <option value="ADM">Administrador</option>
                <option value="Con">Contabilista</option>
                <option value="Dev">Desenvolvedor</option>
                <option value="Prof">Professor</option>
             </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem</label>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>                <!--utilizado para criar uma caixa de mensagem entre o usuario e o servidor, muito utilizado para criar caixa de respostas ou redações-->

        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
