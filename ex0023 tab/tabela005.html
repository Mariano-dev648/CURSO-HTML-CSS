<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercícios de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 500px;
            border-collapse: collapse;
        }
        caption {
             font-size: 1.3;
            font-weight: bolder;
            padding: 8px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        .amarelo {
            background-color: yellow;
        }
        .gray {
            background-color: gray;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <colgroup>
            <col class="amarelo">
            <col class="gray">
            <col class="amarelo" span="2"> 
            
        </colgroup>

        <Caption> Cadastro</Caption>
        <tr>
            <th scope="col">Nome</th>
            <Th scope="col">Sexo</Th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>M</td>
            <td>40</td>
            <td>Bombeiro</td>
        </tr>
        <tr>
            <td>Alice silva</td>
            <td>F</td>
            <td>28</td>
            <td>cozinheira</td>
        </tr>
        <tr>
            <td>jorge nelso</td>
            <td>M</td>
            <td>32</td>
            <td>Jogador</td>
        </tr>
        <tr>
            <td>Alisson</td>
            <td>M</td>
            <td>35</td>
            <td>professor</td>
        </tr>
        <tr>
            <td>Jessica</td>
            <td>F</td>
            <td>20</td>
            <td>Escritora</td>
        </tr>
    </table>
</body>
</html>
