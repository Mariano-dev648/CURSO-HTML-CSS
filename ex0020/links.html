<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
    
    /* # = id
     . = class
     : = pseudo-classe
     :: = pseudo-elemento
     > = filho direto
     + = irmão imediato
     ~ = irmão geral
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: darkblue;
        }

        a: :hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: red;
        }

        .especial {
            background-color: yellow;
        }
        .especial::before {
            content: '>>>';
        }
        .especial::after {
            content: '<<<';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank " class="especial">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Video</a></li>
    </ul>
</body>
</html>
