<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h1>Minha primeira Tabela</h1>
     <!-- HIERARQUIA DE TABELAS (simples)
    TABLE = tabelas
        TABLE HEADER = cabeçalho de tabela
        TABLE DATA = dado de tabela
    -->
    <table> 
        <tr> <!-- Primeira linha -->
            <td>A1</td>
            <TD>B1</TD>
            <TD>C1</TD>
        </tr>
        <tr> <!-- Segunda linha -->
            <td>A2</td>
            <TD>B2</TD>
            <TD>C2</TD>
        </tr>
        <tr> <!-- terceira linha -->
            <td>A3</td>
            <TD>B3</TD>
            <TD>C3</TD>
        </tr>
        <tr> <!-- Quarta linha -->
            <td>A4</td>
            <TD>B4</TD>
            <TD>C4</TD>
        </tr>
    </table>
</body>
</html>
