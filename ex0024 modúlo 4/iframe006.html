<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionando conteúdos</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: black;
            color: white;
        }
   .iframe-container {
        display: flex;
        justify-content: center; /* Centraliza horizontalmente */
        align-items: center; /* Centraliza verticalmente */
        height: 100vh; /* Altura total da janela */
        }

        iframe {
        width: 80%; /* Largura do iframe */
        height: 60%; /* Altura do iframe */
        border: none; /* Remove bordas */
        }
    </style>
</head>
<body>
    
        <h1>conteúdos dentro de iframes</h1>

        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Labore, blanditiis sunt? Quas est quidem nemo dolorum impedit qui facilis nam consequatur perferendis asperiores! Magni, laboriosam quisquam eius veniam reprehenderit vel?</p>

        <h2>Vídeos</h2>

        <iframe div class="iframe-container" width="560" height="315" src="https://www.youtube.com/embed/AVeXSmYUbzo?si=-d2hXpcNtDERqA5V" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        <h2>Mapas do Google</h2>

        <iframe div class="iframe-container" 
        
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3679.345176780955!2d-43.45678372391455!3d-22.75256793237908!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9967a87ece65ff%3A0x717d07e3da1d4a25!2sTopShopping%20Nova%20Igua%C3%A7u!5e0!3m2!1spt-BR!2sbr!4v1777163155052!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        <h2>Mapas do Waze</h2>

        <iframe div class="iframe-container" src="https://embed.waze.com/iframe?zoom=16&lat=-22.752573&lon=-43.454209&ct=livemap" width="600" height="450" allowfullscreen></iframe>
    

    
</body>
</html>
