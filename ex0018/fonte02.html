<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: Arial;
            src: url('Capture it.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de format()
            opentype (otf)
            truetype (ttf)
            webopenfont (woff)
            embedded opentype 
            true type-aat. (aple advanced typography)
            svg
             */
        }
        body {
            font-family: 'Arial', Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Arial',, Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1> Título</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Non sit eius, culpa unde doloremque vitae voluptate assumenda repellat, aut labore ratione quidem doloribus sapiente cupiditate veniam nisi numquam optio dignissimos?</p>
</body>
</html>
