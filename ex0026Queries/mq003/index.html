<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        /* declarações gerais */

        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        html, body {
            height: 100%;
            height: 100vh;
            background-color: rgba(28, 64, 184, 0.842);
            background-size: contain;
            background-repeat: no-repeat;
        }

        h1 {
            color: white;
            text-shadow: 3px 3px 0px red;
            text-align: center;
            padding-top: 10px;
        }
        /* declarações retrato*/
        @media  screen and (orientation: portrait) {
            
            body {
                background: url(../imagens/cev-portrait.jpg);
                background-position:  center bottom;
            }
        }
        
        /* declarações paisagem */
        @media  screen and (orientation: landscape) {

            body {
                background: url(../imagens/cev-landscape.jpg);
                background-position: left bottom;
                background-repeat: no-repeat;
                background-size: contain;
            }
        }
    </style>
</head>
<body>
    <h1>Mude a orientação do seu dispositivo</h1>
</body>
</html>
