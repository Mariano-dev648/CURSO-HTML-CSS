<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border: 10px solid darkslategray;

            padding: 10px;
            margin: 20px 20px 40px 20px;

            outline-width:  5px;
            outline-style: dashed;
            outline-color: salmon;

            /* para fazer outlile de forma direta e simplificada, no caso de forma direta, é melhor utilizar ela da seguinte forma: outline: 5px dashed salmon; */

        }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, Mas os <a href="#">Links são exemplos de caixas inline-level</a>. Vamos ver como tudo funciona.</p>
</body>
</html>
